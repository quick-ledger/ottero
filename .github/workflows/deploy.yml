name: Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["Frontend CI/CD", "Backend CI/CD"]
    types:
      - completed
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
      image_tag:
        description: 'Image tag to deploy (defaults to latest)'
        required: false
        default: 'latest'
      component:
        description: 'Component to deploy'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - frontend
          - backend

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ai-soft-labs/ottero-frontend
  BACKEND_IMAGE: ai-soft-labs/ottero-backend

jobs:
  check-ci-status:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run'
    outputs:
      deploy_frontend: ${{ steps.check.outputs.deploy_frontend }}
      deploy_backend: ${{ steps.check.outputs.deploy_backend }}
    steps:
      - name: Determine what to deploy
        id: check
        run: |
          # Skip if the triggering workflow failed
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "Triggering workflow failed, skipping deployment"
            echo "deploy_frontend=false" >> $GITHUB_OUTPUT
            echo "deploy_backend=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Deploy based on which workflow triggered this
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          echo "Triggered by: $WORKFLOW_NAME"

          if [ "$WORKFLOW_NAME" = "Frontend CI/CD" ]; then
            echo "Frontend CI passed, deploying frontend"
            echo "deploy_frontend=true" >> $GITHUB_OUTPUT
            echo "deploy_backend=false" >> $GITHUB_OUTPUT
          elif [ "$WORKFLOW_NAME" = "Backend CI/CD" ]; then
            echo "Backend CI passed, deploying backend"
            echo "deploy_frontend=false" >> $GITHUB_OUTPUT
            echo "deploy_backend=true" >> $GITHUB_OUTPUT
          else
            echo "Unknown workflow, skipping"
            echo "deploy_frontend=false" >> $GITHUB_OUTPUT
            echo "deploy_backend=false" >> $GITHUB_OUTPUT
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: [check-ci-status]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'workflow_run' && (needs.check-ci-status.outputs.deploy_frontend == 'true' || needs.check-ci-status.outputs.deploy_backend == 'true')))
    environment: prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine components to deploy
        id: components
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COMPONENT="${{ github.event.inputs.component }}"
            if [ "$COMPONENT" = "both" ] || [ -z "$COMPONENT" ]; then
              echo "deploy_frontend=true" >> $GITHUB_OUTPUT
              echo "deploy_backend=true" >> $GITHUB_OUTPUT
            elif [ "$COMPONENT" = "frontend" ]; then
              echo "deploy_frontend=true" >> $GITHUB_OUTPUT
              echo "deploy_backend=false" >> $GITHUB_OUTPUT
            elif [ "$COMPONENT" = "backend" ]; then
              echo "deploy_frontend=false" >> $GITHUB_OUTPUT
              echo "deploy_backend=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "deploy_frontend=${{ needs.check-ci-status.outputs.deploy_frontend }}" >> $GITHUB_OUTPUT
            echo "deploy_backend=${{ needs.check-ci-status.outputs.deploy_backend }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          kubectl config use-context ottero-prod

      - name: Update frontend image tag
        if: steps.components.outputs.deploy_frontend == 'true'
        run: |
          TAG=${{ github.event.inputs.image_tag || 'latest' }}
          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:.*|image: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${TAG}|g" infra/k8s/06-frontend.yaml

      - name: Update backend image tag
        if: steps.components.outputs.deploy_backend == 'true'
        run: |
          TAG=${{ github.event.inputs.image_tag || 'latest' }}
          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:.*|image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${TAG}|g" infra/k8s/05-backend.yaml

      - name: Deploy frontend
        if: steps.components.outputs.deploy_frontend == 'true'
        run: |
          echo "Deploying frontend..."
          kubectl apply -f infra/k8s/06-frontend.yaml

      - name: Deploy backend
        if: steps.components.outputs.deploy_backend == 'true'
        run: |
          echo "Deploying backend..."
          kubectl apply -f infra/k8s/05-backend.yaml

      - name: Wait for frontend rollout
        if: steps.components.outputs.deploy_frontend == 'true'
        run: |
          kubectl rollout status deployment/ottero-frontend -n ottero --timeout=300s

      - name: Wait for backend rollout
        if: steps.components.outputs.deploy_backend == 'true'
        run: |
          kubectl rollout status deployment/ottero-backend -n ottero --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n ottero
          kubectl get services -n ottero
